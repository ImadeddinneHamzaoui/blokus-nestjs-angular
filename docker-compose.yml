version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: blokus_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: blokus
      MYSQL_USER: blokus
      MYSQL_PASSWORD: blokus
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build: ./backend
    container_name: blokus_backend
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USERNAME=blokus
      - DB_PASSWORD=blokus
      - DB_DATABASE=blokus
      - JWT_SECRET=blokus_super_secret_key_2024
      - PORT=3000
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: blokus_frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  mysql_data:
